[package]
edition = "2021"
name = "roux"
version = "2.2.15"
authors = ["Justin Duch <justin@duch.me>"]
build = false
exclude = [
    ".github/*",
    ".gitignore",
    "assets/",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Simple and (a)synchronous Reddit API wrapper"
documentation = "https://docs.rs/roux"
readme = "README.md"
keywords = [
    "reddit",
    "api",
    "async",
]
categories = [
    "authentication",
    "api-bindings",
    "network-programming",
]
license = "MIT"
repository = "https://github.com/halcyonnouveau/roux"

[features]
blocking = [
    "maybe-async/is_sync",
    "reqwest/blocking",
]
default = ["native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls"]

[lib]
name = "roux"
path = "src/lib.rs"

[[test]]
name = "tests"
path = "tests/tests.rs"

[dependencies.maybe-async]
version = "0.2"

[dependencies.reqwest]
version = "0.12.23"
features = ["json"]
default-features = false

[dependencies.serde]
version = "1.0"
